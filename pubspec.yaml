name: local_vyapari_vendor
description: A production-grade Flutter mobile application for the vendor side of Local Vyapari.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  dio: ^5.4.0
  go_router: ^12.1.1
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  image_picker: ^1.2.2
  geolocator: ^10.1.0
  fl_chart: ^0.65.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  crypto: ^3.0.7
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  firebase_database: ^12.4.1
  geocoding: ^4.0.0
  cloud_firestore: ^6.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.7
  freezed: ^2.4.5
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
