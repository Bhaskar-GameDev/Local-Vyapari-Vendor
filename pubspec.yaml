name: local_vyapari_vendor
description: A production-grade Flutter mobile application for the vendor side of Local Vyapari.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  dio: ^5.4.0
  go_router: ^12.1.1
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  image_picker: ^1.2.2
  geolocator: ^10.1.0
  fl_chart: ^0.65.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  crypto: ^3.0.7
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  firebase_database: ^12.4.1
  geocoding: ^4.0.0
  cloud_firestore: ^6.4.1
  cloud_functions: ^6.3.1
  url_launcher: ^6.3.2
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^21.0.0
  connectivity_plus: ^6.0.0
  firebase_crashlytics: ^5.0.0
  firebase_app_check: ^0.4.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.3
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  mocktail: ^1.0.4
  build_runner: ^2.4.7
  freezed: ^2.4.5
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
